<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion & Editorial — Seed 13 Productions</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f0f0f; color: #e0e0e0; font-family: 'Inter', sans-serif; min-height: 100vh; }
  header { background: rgba(15,15,15,0.95); padding: 1rem 2rem; border-bottom: 1px solid #1a1a1a; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
  header a { color: #00d4ff; text-decoration: none; font-size: 0.9rem; }
  .hero { padding: 3rem 2rem 2rem; text-align: center; }
  .hero h1 { font-size: 2.5rem; background: linear-gradient(135deg, #00d4ff, #ff6b9d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
  .hero p { color: #888; max-width: 600px; margin: 0 auto; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; padding: 2rem; max-width: 1400px; margin: 0 auto; }
  .grid img { width: 100%; aspect-ratio: 3/4; object-fit: cover; object-position: top; border-radius: 8px; cursor: pointer; transition: transform 0.2s; border: 1px solid #1a1a1a; }
  .grid img:hover { transform: scale(1.02); }
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; }
  .modal.active { display: flex; }
  .modal img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 8px; }
  .modal-close { position: absolute; top: 1rem; right: 1.5rem; font-size: 2rem; cursor: pointer; color: #fff; background: none; border: none; }
  footer { text-align: center; padding: 2rem; color: #444; font-size: 0.8rem; border-top: 1px solid #1a1a1a; margin-top: 2rem; }
</style>
</head>
<body>
<header>
  <span style="font-weight:700; color:#00d4ff;">Seed 13 Productions</span>
  <a href="https://seed13.com">&larr; All Galleries</a>
</header>
<div class="hero">
  <h1>Fashion & Editorial</h1>
  <p>Bold portraits, editorial looks, and high-concept fashion from the Seed 13 AI studio.</p>
</div>
<div class="grid" id="grid"></div>
<div class="modal" id="modal">
  <button class="modal-close" onclick="closeModal()">&#x2715;</button>
  <img id="modalImg" src="" alt="">
</div>
<script>
const images = ["A_beautiful_Asian_girl_wearing_a_white_shirt_01.png", "A_beautiful_Asian_girl_wearing_a_white_shirt_02.png", "A_beautiful_Asian_girl_wearing_a_white_shirt_03.png", "asymmetrical_fashion_editorial_1.png", "confident_woman_black_outfit.png", "elegant_woman_with_gun.png", "evolution_of_hipster_style.png", "fiery_elegance_on_beach.png", "futuristic_fashion_model_on_stairs.png", "stylish_woman_in_black_and_pink_outfit.png", "woman_with_freckles_and_blue_eyes1.png", "woman_with_freckles_and_blue_eyes.png"];
const grid = document.getElementById("grid");
images.forEach((fn, i) => {
  const img = document.createElement("img");
  img.src = "images/" + fn;
  img.alt = fn.replace(/[_-]/g," ").replace(/\.png$/,"");
  img.onclick = () => openModal(i);
  grid.appendChild(img);
});
function openModal(i) {
  document.getElementById("modalImg").src = "images/" + images[i];
  document.getElementById("modal").classList.add("active");
}
function closeModal() {
  document.getElementById("modal").classList.remove("active");
}
document.getElementById("modal").onclick = e => { if(e.target===e.currentTarget) closeModal(); };
document.addEventListener("keydown", e => { if(e.key==="Escape") closeModal(); });
</script>
<footer>&copy; 2025 Seed 13 Productions &bull; #nokings</footer>
</body>
</html>
